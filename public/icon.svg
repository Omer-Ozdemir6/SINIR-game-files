  <g stroke="#5a8a6a" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="86" x2="256" y2="104"/>
    <line x1="256" y1="408" x2="256" y2="426"/>
    <line x1="86" y1="256" x2="104" y2="256"/>
    <line x1="408" y1="256" x2="426" y2="256"/>
